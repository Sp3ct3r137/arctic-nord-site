# =============================================================
# nginx.conf — Arctic Nord Site
# =============================================================
# Architecture:
#   Client → Nginx (port 80/443) → Gunicorn (127.0.0.1:8000)
#
# Nginx handles:
#   • Serving static files directly (CSS, JS) — never hits Python
#   • Reverse-proxying all other requests to Gunicorn
#   • Gzip compression
#   • Security headers
#   • Optional HTTPS redirect (see the SSL server block at bottom)
#
# Gunicorn handles:
#   • Running the Flask WSGI app (app:app)
#   • Worker process management
# =============================================================

# ── Worker settings ──────────────────────────────────────────
# auto = one worker process per CPU core
worker_processes auto;

# Max simultaneous connections across all workers
events {
    worker_connections 1024;
    use epoll;                  # Linux only — efficient I/O multiplexing
    multi_accept on;
}

http {

    # ── MIME types ───────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ──────────────────────────────────────────
    sendfile           on;      # zero-copy file transfers
    tcp_nopush         on;      # send headers in one packet
    tcp_nodelay        on;      # disable Nagle for keep-alive
    keepalive_timeout  65;

    # ── Gzip compression ─────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;        # 1 (fastest) – 9 (smallest); 6 is the sweet spot
    gzip_min_length   256;      # don't compress tiny responses
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Upstream: Gunicorn ────────────────────────────────────
    # Points to the Gunicorn WSGI server.
    # In Docker Compose this resolves to the "app" service hostname.
    # For a bare-metal setup use 127.0.0.1:8000.
    upstream flask_app {
        server app:8000;            # docker-compose service name : port
        # server 127.0.0.1:8000;   # ← use this for bare-metal / systemd
        keepalive 32;               # reuse upstream connections
    }

    # ── HTTP server block (port 80) ───────────────────────────
    server {
        listen 80;
        listen [::]:80;             # IPv6
        server_name _;              # catch-all; replace with your domain

        # ── Security headers ─────────────────────────────────
        add_header X-Content-Type-Options  "nosniff"         always;
        add_header X-Frame-Options         "SAMEORIGIN"      always;
        add_header X-XSS-Protection        "1; mode=block"   always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # ── Static files — served directly by Nginx ──────────
        # Flask's url_for('static', filename='...') generates /static/... URLs.
        # Nginx intercepts these here so they never reach Python.
        location /static/ {
            alias /app/static/;             # must match WORKDIR in Dockerfile
            expires 30d;                    # aggressive browser caching
            add_header Cache-Control "public, immutable";
            access_log off;                 # skip log noise for assets
            gzip_static on;                 # serve pre-compressed .gz if present
        }

        # ── Favicon ──────────────────────────────────────────
        location = /favicon.ico {
            alias /app/static/favicon.ico;
            log_not_found off;
            access_log    off;
        }

        # ── Proxy everything else to Gunicorn ────────────────
        location / {
            proxy_pass         http://flask_app;

            # Pass real client info to Flask (request.remote_addr etc.)
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts — increase for slow endpoints
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Buffer tuning
            proxy_buffering    on;
            proxy_buffer_size  8k;
            proxy_buffers      8 8k;
        }

        # ── Health check endpoint ─────────────────────────────
        # Useful for load balancers (Railway, GCP, etc.)
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }

    # ── HTTPS server block (port 443) ───────────────────────
    # SETUP-HTTPS-BEGIN
    # Run scripts/setup-https.sh to auto-fill your domain and uncomment.
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #
    #     # Mozilla Intermediate SSL config (TLS 1.2 + 1.3)
    #     ssl_protocols             TLSv1.2 TLSv1.3;
    #     ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache         shared:SSL:10m;
    #     ssl_session_timeout       1d;
    #     ssl_session_tickets       off;
    #
    #     # HSTS — tells browsers to always use HTTPS for this domain
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # Security headers (same as HTTP block)
    #     add_header X-Content-Type-Options  "nosniff"        always;
    #     add_header X-Frame-Options         "SAMEORIGIN"     always;
    #     add_header X-XSS-Protection        "1; mode=block"  always;
    #     add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
