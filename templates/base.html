<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block meta_desc %}Arctic Nord — a Flask demo site built with the Nord colour palette and an orange accent.{% endblock %}" />

  <!-- Open Graph -->
  <meta property="og:title"       content="{% block og_title %}Arctic Nord{% endblock %}" />
  <meta property="og:description" content="Arctic Nord — Flask + Nord theme + orange accent." />
  <meta property="og:type"        content="website" />

  <title>{% block title %}Arctic Nord{% endblock %}</title>

  <!-- Fonts: JetBrains Mono (display) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300..700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

  <!-- Favicon (inline SVG snowflake) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232E3440'/><line x1='16' y1='4' x2='16' y2='28' stroke='%2388C0D0' stroke-width='2.5'/><line x1='4' y1='16' x2='28' y2='16' stroke='%2388C0D0' stroke-width='2.5'/><line x1='7.5' y1='7.5' x2='24.5' y2='24.5' stroke='%2388C0D0' stroke-width='2.5'/><line x1='24.5' y1='7.5' x2='7.5' y2='24.5' stroke='%2388C0D0' stroke-width='2.5'/><circle cx='16' cy='16' r='3' fill='%23D08770'/></svg>" />

  {% block head_extra %}{% endblock %}
</head>
<body>

  <!-- ── Navigation ───────────────────────────────────────── -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="container nav__inner">

      <!-- Logo -->
      <a href="{{ url_for('index') }}" class="nav__logo" aria-label="Arctic Nord Home">
        <!-- Inline SVG logo: snowflake mark -->
        <svg class="nav__logo-mark" viewBox="0 0 32 32" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="6" fill="#3B4252"/>
          <line x1="16" y1="4"   x2="16" y2="28"   stroke="#88C0D0" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="4"  y1="16"  x2="28" y2="16"   stroke="#88C0D0" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="7.5" y1="7.5"   x2="24.5" y2="24.5" stroke="#88C0D0" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="24.5" y1="7.5"  x2="7.5"  y2="24.5" stroke="#88C0D0" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="16" cy="16" r="3.5" fill="#D08770"/>
        </svg>
        Arctic<span>Nord</span>
      </a>

      <!-- Links -->
      <ul class="nav__links" role="list">
        <li><a href="{{ url_for('index') }}"         class="{{ 'active' if request.endpoint == 'index' }}">Home</a></li>
        <li><a href="{{ url_for('about') }}"         class="{{ 'active' if request.endpoint == 'about' }}">About</a></li>
        <li><a href="{{ url_for('documentation') }}" class="{{ 'active' if request.endpoint == 'documentation' }}">Docs</a></li>
        <li><a href="{{ url_for('subscribe') }}"     class="{{ 'active' if request.endpoint in ('subscribe', 'subscribe_confirm') }}">Subscribe</a></li>
        <li><a href="/api/palette"                   target="_blank" rel="noopener">API ↗</a></li>
      </ul>

      <a href="{{ url_for('subscribe') }}" class="nav__cta">Get Started</a>
    </div>
  </nav>

  <!-- ── Page Content ─────────────────────────────────────── -->
  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ───────────────────────────────────────────── -->
  <footer class="footer" role="contentinfo">
    <div class="container footer__inner">
      <p class="footer__copy">
        &copy; {{ current_year }} {{ site_name }} &mdash;
        Built with <a href="https://flask.palletsprojects.com" target="_blank" rel="noopener">Flask</a>
        &amp; the <a href="https://www.nordtheme.com" target="_blank" rel="noopener">Nord Palette</a>
      </p>
      <nav class="footer__links" aria-label="Footer navigation">
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('about') }}">About</a>
        <a href="{{ url_for('documentation') }}">Docs</a>
        <a href="/api/palette" target="_blank" rel="noopener">API</a>
      </nav>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
  {% block scripts_extra %}{% endblock %}
</body>
</html>
