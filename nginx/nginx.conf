    # ── HTTP → HTTPS redirect ────────────────────────────────
    # SETUP-REDIRECT-BEGIN
    # Uncommented by scripts/setup-https.sh
    # server {
    #     listen 80;
    #     listen [::]:80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }
    # SETUP-REDIRECT-END
}
